<div class="page active" id="page-dashboard">
  <div class="page-header">
    <div class="page-title">早安，<span id="welcome-name">交易員</span> 👋</div>
    <div class="page-sub" id="market-status-sub">載入中...</div>
  </div>
  <div class="dash-grid">
    <div class="stat-card"><div class="stat-label">總資產</div><div class="stat-value neutral" id="total-assets">$1,000,000</div></div>
    <div class="stat-card"><div class="stat-label">排行榜名次</div><div class="stat-value neutral" id="my-rank">#--</div></div>
  </div>
  <div class="dash-main">
    <div class="card">
      <div class="section-title"><span class="dot"></span> 我的持倉</div>
      <table>
        <thead><tr><th>股票</th><th>持股</th><th>現價</th><th>損益</th></tr></thead>
        <tbody id="holdings-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── 核心狀態 ──
const INITIAL_CASH = 1000000;
let currentUser = null;
let state = { cash: INITIAL_CASH, holdings: {}, trades: [], posts: [] };
let selectedStock = null;

// ── 1. Google 登入與存檔邏輯 ──
function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  currentUser = { id: payload.sub, name: payload.name, photo: payload.picture };
  
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('user-name').textContent = currentUser.name;
  document.getElementById('user-photo').src = currentUser.photo;
  document.getElementById('welcome-name').textContent = currentUser.name;
  
  loadUserData();
  initApp();
}

function saveUserData() {
  if (!currentUser) return;
  localStorage.setItem(`trading_save_${currentUser.id}`, JSON.stringify(state));
}

function loadUserData() {
  const saved = localStorage.getItem(`trading_save_${currentUser.id}`);
  if (saved) {
    state = JSON.parse(saved);
    showToast("進度已自動同步", "success");
  }
  updateUI();
}

// ── 2. 報價與交易邏輯 (對接 Yahoo API) ──
async function fetchQuote(code) {
  const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+code+'.TW')}`;
  try {
    const r = await fetch(proxy);
    const d = await r.json();
    const meta = d?.chart?.result?.[0]?.meta;
    return meta ? { code, name: meta.shortName, price: meta.regularMarketPrice } : null;
  } catch(e) { return null; }
}

async function triggerSearch() {
  const code = document.getElementById('stock-search').value.trim();
  if(!code) return;
  const q = await fetchQuote(code);
  if(q) {
    selectedStock = q;
    document.getElementById('price-display').style.display = 'flex';
    document.getElementById('current-price-display').textContent = q.price.toFixed(2);
    document.getElementById('stock-name-display').textContent = q.name;
    updateUI();
  } else {
    showToast("查無代碼", "error");
  }
}

function executeTrade(type) {
  const qty = parseInt(document.getElementById('trade-qty').value);
  if(!selectedStock || !qty || qty <= 0) return showToast("請檢查輸入", "error");
  
  const cost = selectedStock.price * qty * 1000;
  if(type === 'buy') {
    if(state.cash < cost) return showToast("資金不足", "error");
    state.cash -= cost;
    state.holdings[selectedStock.code] = (state.holdings[selectedStock.code] || 0) + qty;
  } else {
    if((state.holdings[selectedStock.code] || 0) < qty) return showToast("持股不足", "error");
    state.cash += cost;
    state.holdings[selectedStock.code] -= qty;
    if(state.holdings[selectedStock.code] === 0) delete state.holdings[selectedStock.code];
  }
  
  saveUserData();
  updateUI();
  showToast("交易成功！");
}

// ── 3. UI 渲染 ──
function updateUI() {
  document.getElementById('nav-cash').textContent = `$${state.cash.toLocaleString()}`;
  document.getElementById('total-assets').textContent = `$${state.cash.toLocaleString()}`;
  
  const tbody = document.getElementById('holdings-body');
  tbody.innerHTML = Object.keys(state.holdings).map(code => `
    <tr>
      <td><span class="stock-code">${code}</span></td>
      <td>${state.holdings[code]}</td>
      <td>--</td>
      <td>--</td>
    </tr>
  `).join('');
  
  renderPosts();
  renderLeaderboard();
}

function renderPosts() {
  const container = document.getElementById('posts-container');
  if(!container) return;
  container.innerHTML = state.posts.map(p => `
    <div class="post-card">
      <strong>${p.user}</strong>: ${p.content}
    </div>
  `).join('');
}

function submitPost() {
  const input = document.getElementById('post-input');
  if(!input.value.trim()) return;
  state.posts.unshift({ user: currentUser.name, content: input.value });
  input.value = '';
  saveUserData();
  renderPosts();
}

function renderLeaderboard() {
  const list = document.getElementById('leaderboard-list');
  if(!list) return;
  list.innerHTML = `<div class="rank-row">#1 ${currentUser?.name || '您'} - $${state.cash.toLocaleString()}</div>`;
}

// ── 4. 初始化 ──
function initApp() {
  const now = new Date();
  const sub = document.getElementById('market-status-sub');
  sub.textContent = (now.getHours() >= 9 && now.getHours() < 14) ? "台股交易中 🟢" : "已收盤 🔴";
  updateUI();
}

function showPage(id, tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (tab) tab.classList.add('active');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + (type || '');
  setTimeout(() => t.className = '', 2500);
}

function logout() {
  if(confirm("確定登出？")) location.reload();
}

window.onload = () => {
  // 等待 Google 登入回調
};
</script>
</body>
</html>
