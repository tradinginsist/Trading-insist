<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Insist — 模擬交易平台</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a;--bg2:#0f1525;--bg3:#151d30;--border:#1e2d4a;
    --accent:#00e5ff;--accent2:#7c3aed;--green:#00e676;--red:#ff1744;
    --yellow:#ffd600;--text:#e8f0fe;--text2:#8899bb;--text3:#445577;
    --card:#111827;--mono:'Space Mono',monospace;--sans:'Noto Sans TC',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.25;pointer-events:none;}

  /* SETUP */
  #setup-screen{display:none !important;}
  .setup-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:500px;max-width:90vw;position:relative;z-index:1;}
  .setup-logo{font-family:var(--mono);font-size:1.4rem;color:var(--accent);letter-spacing:3px;font-weight:700;margin-bottom:0.5rem;}
  .setup-title{font-size:1.1rem;font-weight:900;margin-bottom:0.5rem;}
  .setup-desc{font-size:0.85rem;color:var(--text2);line-height:1.7;margin-bottom:1.5rem;}
  .setup-step{background:var(--bg3);border-radius:8px;padding:1rem;margin-bottom:0.75rem;font-size:0.83rem;color:var(--text2);line-height:1.7;border-left:3px solid var(--accent);}
  .setup-step strong{color:var(--accent);}
  .setup-link{color:var(--accent);text-decoration:underline;}
  .setup-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0.85rem 1rem;color:var(--text);font-family:var(--mono);font-size:0.85rem;outline:none;transition:border-color 0.2s;margin:1rem 0;}
  .setup-input:focus{border-color:var(--accent);}
  .btn-setup{width:100%;padding:0.9rem;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:900;font-size:1rem;cursor:pointer;font-family:var(--sans);transition:all 0.2s;}
  .btn-setup:hover{background:#33eeff;}
  .setup-note{font-size:0.72rem;color:var(--text3);text-align:center;margin-top:0.75rem;}

  /* NAV */
  nav{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;}
  .nav-logo{font-family:var(--mono);font-size:1.1rem;color:var(--accent);letter-spacing:2px;font-weight:700;}
  .nav-logo span{color:var(--text2);}
  .nav-tabs{display:flex;gap:0.25rem;}
  .nav-tab{padding:0.4rem 1rem;border-radius:6px;cursor:pointer;font-size:0.85rem;color:var(--text2);border:none;background:none;transition:all 0.2s;font-family:var(--sans);}
  .nav-tab:hover{color:var(--text);background:var(--bg3);}
  .nav-tab.active{color:var(--accent);background:rgba(0,229,255,0.08);}
  .nav-right{display:flex;align-items:center;gap:1rem;}
  .nav-cash{font-family:var(--mono);font-size:0.85rem;color:var(--green);font-weight:700;}
  .api-badge{font-size:0.7rem;font-family:var(--mono);padding:0.2rem 0.6rem;border-radius:4px;}
  .api-ok{background:rgba(0,230,118,0.1);color:var(--green);}
  .api-err{background:rgba(255,23,68,0.1);color:var(--red);}
  .api-loading{background:rgba(255,214,0,0.1);color:var(--yellow);}

  /* PAGES */
  .page{display:none;padding:2rem;max-width:1400px;margin:0 auto;position:relative;z-index:1;}
  .page.active{display:block;animation:fadeIn 0.3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* COMPONENTS */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;}
  .dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
  .stat-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--text3);font-family:var(--mono);margin-bottom:0.5rem;}
  .stat-value{font-size:1.6rem;font-weight:900;font-family:var(--mono);}
  .stat-sub{font-size:0.75rem;color:var(--text2);margin-top:0.25rem;font-family:var(--mono);}
  .up{color:var(--green)}.down{color:var(--red)}.neutral{color:var(--accent)}
  .dash-main{display:grid;grid-template-columns:1fr 320px;gap:1.5rem;}
  table{width:100%;border-collapse:collapse;}
  th{font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-family:var(--mono);padding:0.6rem 0.75rem;text-align:left;border-bottom:1px solid var(--border);}
  td{padding:0.75rem;font-size:0.88rem;border-bottom:1px solid rgba(30,45,74,0.5);}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .stock-code{font-family:var(--mono);font-weight:700;color:var(--accent);}
  .stock-name{color:var(--text2);font-size:0.8rem;}

  /* TRADE */
  .trade-grid{display:grid;grid-template-columns:420px 1fr;gap:1.5rem;}
  .trade-form{display:flex;flex-direction:column;gap:1rem;}
  .form-group{display:flex;flex-direction:column;gap:0.5rem;}
  label{font-size:0.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-family:var(--mono);}
  input,select{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1rem;color:var(--text);font-size:0.9rem;font-family:var(--sans);transition:border-color 0.2s;outline:none;}
  input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,0.1);}

  /* STOCK SEARCH */
  .search-wrap{position:relative;}
  .search-input{width:100%;padding-right:3rem;}
  .search-clear{position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;line-height:1;padding:0.25rem;}
  .search-clear:hover{color:var(--text);}
  .search-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;z-index:50;max-height:200px;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,0.4);}
  .search-item{padding:0.65rem 1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background 0.15s;}
  .search-item:hover,.search-item.selected{background:rgba(0,229,255,0.07);}
  .search-item-code{font-family:var(--mono);font-size:0.85rem;color:var(--accent);font-weight:700;}
  .search-item-name{font-size:0.82rem;color:var(--text2);}
  .search-item-price{font-family:var(--mono);font-size:0.82rem;}
  .search-empty{padding:1rem;text-align:center;color:var(--text3);font-size:0.83rem;}
  .search-loading{padding:1rem;text-align:center;color:var(--text3);font-size:0.83rem;}

  .btn{padding:0.85rem 1.5rem;border-radius:8px;border:none;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:var(--sans);}
  .btn-buy{background:var(--green);color:#000;}
  .btn-buy:hover{background:#00ff88;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,230,118,0.3);}
  .btn-sell{background:var(--red);color:#fff;}
  .btn-sell:hover{background:#ff4444;transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,23,68,0.3);}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
  .price-display{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1rem;display:flex;justify-content:space-between;align-items:center;}
  .price-big{font-family:var(--mono);font-size:1.8rem;font-weight:700;}
  .price-change{font-family:var(--mono);font-size:0.85rem;padding:0.25rem 0.6rem;border-radius:4px;}
  .price-change.up{background:rgba(0,230,118,0.15);color:var(--green);}
  .price-change.down{background:rgba(255,23,68,0.15);color:var(--red);}
  .price-change.flat{background:rgba(136,153,187,0.15);color:var(--text2);}
  .trade-summary{background:var(--bg3);border-radius:8px;padding:1rem;font-family:var(--mono);font-size:0.82rem;}
  .ts-row{display:flex;justify-content:space-between;padding:0.3rem 0;border-bottom:1px solid var(--border);}
  .ts-row:last-child{border-bottom:none;font-weight:700;}

  /* MARKET WATCHLIST */
  .watchlist-item{display:flex;justify-content:space-between;align-items:center;padding:0.55rem 0.75rem;border-radius:8px;cursor:pointer;transition:background 0.15s;border-bottom:1px solid rgba(30,45,74,0.4);}
  .watchlist-item:hover{background:rgba(0,229,255,0.05);}
  .watchlist-item:last-child{border-bottom:none;}

  /* LEADERBOARD */
  .lb-grid{display:grid;grid-template-columns:1fr 320px;gap:1.5rem;}
  .rank-row{display:flex;align-items:center;gap:1rem;padding:1rem;border-radius:10px;border:1px solid var(--border);margin-bottom:0.5rem;background:var(--bg2);}
  .rank-row.top1{border-color:var(--yellow);background:rgba(255,214,0,0.05);}
  .rank-row.top2{border-color:#aaa;background:rgba(170,170,170,0.05);}
  .rank-row.top3{border-color:#cd7f32;background:rgba(205,127,50,0.05);}
  .rank-num{font-family:var(--mono);font-size:1.1rem;font-weight:700;width:2rem;text-align:center;}
  .rank-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
  .rank-name{font-weight:700;font-size:0.95rem;}
  .rank-sub{font-size:0.75rem;color:var(--text2);font-family:var(--mono);}
  .rank-return{font-family:var(--mono);font-size:1.1rem;font-weight:700;margin-left:auto;}
  .rank-badge{font-size:0.7rem;padding:0.2rem 0.5rem;border-radius:4px;background:rgba(0,229,255,0.1);color:var(--accent);font-family:var(--mono);}

  /* LEARN */
  .learn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
  .lesson-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.2s;}
  .lesson-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.3);border-color:var(--accent2);}
  .lesson-thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:3rem;}
  .lesson-body{padding:1rem;}
  .lesson-tag{font-size:0.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent2);font-family:var(--mono);margin-bottom:0.4rem;}
  .lesson-title{font-size:0.95rem;font-weight:700;margin-bottom:0.4rem;}
  .lesson-desc{font-size:0.8rem;color:var(--text2);line-height:1.5;}
  .lesson-meta{display:flex;justify-content:space-between;align-items:center;margin-top:0.75rem;}
  .lesson-time{font-size:0.72rem;color:var(--text3);font-family:var(--mono);}
  .lesson-level{font-size:0.65rem;padding:0.2rem 0.5rem;border-radius:4px;font-family:var(--mono);}
  .level-easy{background:rgba(0,230,118,0.1);color:var(--green);}
  .level-mid{background:rgba(255,214,0,0.1);color:var(--yellow);}
  .level-hard{background:rgba(255,23,68,0.1);color:var(--red);}

  /* COMMUNITY */
  .community-grid{display:grid;grid-template-columns:1fr 300px;gap:1.5rem;}
  .post-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:0.75rem;}
  .post-header{display:flex;gap:0.75rem;align-items:center;margin-bottom:0.75rem;}
  .post-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1rem;}
  .post-user{font-weight:700;font-size:0.88rem;}
  .post-time{font-size:0.72rem;color:var(--text3);font-family:var(--mono);}
  .post-content{font-size:0.88rem;line-height:1.6;color:var(--text2);margin-bottom:0.75rem;}
  .post-tag{display:inline-block;font-size:0.7rem;padding:0.15rem 0.5rem;border-radius:4px;background:rgba(124,58,237,0.15);color:var(--accent2);font-family:var(--mono);margin-right:0.4rem;}
  .post-actions{display:flex;gap:1rem;margin-top:0.6rem;}
  .post-action{font-size:0.78rem;color:var(--text3);cursor:pointer;transition:color 0.2s;}
  .post-action:hover{color:var(--accent);}
  .new-post-area{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem;}
  textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0.75rem;color:var(--text);font-family:var(--sans);font-size:0.88rem;resize:none;outline:none;transition:border-color 0.2s;}
  textarea:focus{border-color:var(--accent);}
  .btn-post{background:var(--accent2);color:#fff;padding:0.5rem 1.25rem;border-radius:6px;border:none;font-size:0.85rem;font-weight:700;cursor:pointer;margin-top:0.5rem;font-family:var(--sans);transition:all 0.2s;}
  .btn-post:hover{background:#6d28d9;}

  /* MISC */
  .page-header{margin-bottom:1.5rem;}
  .page-title{font-size:1.5rem;font-weight:900;margin-bottom:0.25rem;}
  .page-sub{font-size:0.85rem;color:var(--text2);}
  .section-title{font-size:1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;}
  .dot.green{background:var(--green)}.dot.purple{background:var(--accent2);}
  .divider{border:none;border-top:1px solid var(--border);margin:1rem 0;}
  .tag{display:inline-block;font-size:0.7rem;padding:0.
