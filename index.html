<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Insist — 模擬交易平台</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a;--bg2:#0f1525;--bg3:#151d30;--border:#1e2d4a;
    --accent:#00e5ff;--accent2:#7c3aed;--green:#00e676;--red:#ff1744;
    --yellow:#ffd600;--text:#e8f0fe;--text2:#8899bb;--text3:#445577;
    --card:#111827;--mono:'Space Mono',monospace;--sans:'Noto Sans TC',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.25;pointer-events:none;}

  /* 登入畫面 */
  #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .setup-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:450px;max-width:90vw;text-align:center;}
  
  /* NAV */
  nav{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;}
  .nav-logo{font-family:var(--mono);font-size:1.1rem;color:var(--accent);letter-spacing:2px;font-weight:700;}
  .nav-tabs{display:flex;gap:0.25rem;}
  .nav-tab{padding:0.4rem 1rem;border-radius:6px;cursor:pointer;font-size:0.85rem;color:var(--text2);border:none;background:none;transition:all 0.2s;}
  .nav-tab.active{color:var(--accent);background:rgba(0,229,255,0.08);}
  .user-profile { display: flex; align-items: center; gap: 8px; cursor: pointer; border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; transition: 0.2s; }
  .user-avatar { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--accent); }

  /* PAGES */
  .page{display:none;padding:2rem;max-width:1400px;margin:0 auto;position:relative;z-index:1;}
  .page.active{display:block;animation:fadeIn 0.3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* COMPONENTS */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
  .stat-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--text3);font-family:var(--mono);margin-bottom:0.5rem;}
  .stat-value{font-size:1.6rem;font-weight:900;font-family:var(--mono);}
  
  table{width:100%;border-collapse:collapse;}
  th{font-size:0.7rem;color:var(--text3);padding:0.6rem 0.75rem;text-align:left;border-bottom:1px solid var(--border);font-family:var(--mono);}
  td{padding:0.75rem;font-size:0.88rem;border-bottom:1px solid rgba(30,45,74,0.5);}
  
  .stock-code{font-family:var(--mono);font-weight:700;color:var(--accent);}
  .btn{padding:0.85rem 1.5rem;border-radius:8px;border:none;font-weight:700;cursor:pointer;transition:0.2s;font-family:var(--sans);}
  .btn-buy{background:var(--green);color:#000; width:100%;}
  .btn-sell{background:var(--red);color:#fff; width:100%;}
  
  input, textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:0.75rem;color:var(--text);margin-bottom:10px;outline:none;}
  input:focus{border-color:var(--accent);}

  .api-badge{font-size:0.7rem;font-family:var(--mono);padding:0.2rem 0.6rem;border-radius:4px;margin-right:10px;}
  .api-ok{background:rgba(0,230,118,0.1);color:var(--green);}
  .api-err{background:rgba(255,23,68,0.1);color:var(--red);}
  .api-loading{background:rgba(255,214,0,0.1);color:var(--yellow);}

  .rank-row{display:flex;align-items:center;gap:1rem;padding:1rem;border-radius:10px;border:1px solid var(--border);margin-bottom:0.5rem;background:var(--bg2);}
  .post-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:0.75rem;}
  #toast{position:fixed;bottom:2rem;right:2rem;z-index:999;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:1rem 1.5rem;opacity:0;transition:0.3s;pointer-events:none;}
  #toast.show{opacity:1;transform:translateY(-10px);}
</style>
</head>
<body>

<div id="login-overlay">
  <div class="setup-box">
    <div class="nav-logo" style="font-size:1.5rem; margin-bottom:1rem;">TRADING <span>INSIST</span></div>
    <div style="color:var(--text2); margin-bottom:2rem;">請登入 Google 帳號以載入交易存檔</div>
    <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
    <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large" data-shape="pill"></div>
  </div>
</div>

<nav>
  <div class="nav-logo">TRADING <span>INSIST</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('dashboard',this)">總覽</button>
    <button class="nav-tab" onclick="showPage('trade',this)">交易</button>
    <button class="nav-tab" onclick="showPage('leaderboard',this)">排行榜</button>
    <button class="nav-tab" onclick="showPage('community',this)">社群</button>
  </div>
  <div class="nav-right">
    <span id="api-badge" class="api-badge api-loading">API 檢查中</span>
    <span id="nav-cash" style="color:var(--green); font-family:var(--mono); margin-right:15px;">$1,000,000</span>
    <div class="user-profile" onclick="logout()">
        <img id="user-photo" class="user-avatar" src="">
        <span id="user-name" style="font-size: 0.75rem; color: var(--text2);">帳號</span>
    </div>
  </div>
</nav>

<div class="page active" id="page-dashboard">
  <div class="page-header">
    <div class="page-title">早安，<span id="welcome-name">交易員</span> 👋</div>
    <div class="page-sub" id="market-status-sub">連線中...</div>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">總資產</div><div class="stat-value" id="total-assets">$1,000,000</div></div>
    <div class="stat-card"><div class="stat-label">今日損益</div><div class="stat-value" id="today-pnl">$0</div></div>
    <div class="stat-card"><div class="stat-label">持股數</div><div class="stat-value" id="holding-count">0</div></div>
    <div class="stat-card"><div class="stat-label">排名</div><div class="stat-value" id="my-rank">#--</div></div>
  </div>
  <div class="card">
    <div style="font-weight:700; margin-bottom:15px;">我的持倉</div>
    <table>
      <thead><tr><th>代碼</th><th>張數</th><th>成本</th><th>現價</th><th>損益</th></tr></thead>
      <tbody id="holdings-body"></tbody>
    </table>
  </div>
</div>

<div class="page" id="page-trade">
  <div class="card" style="max-width:600px; margin:0 auto;">
    <div style="font-weight:700; margin-bottom:15px;">股票搜尋</div>
    <input type="text" id="stock-search" placeholder="輸入台股代碼 (例: 2330)">
    <button class="btn" style="background:var(--accent); color:#000; width:100%; margin-bottom:20px;" onclick="triggerSearch()">查詢即時行情</button>
    
    <div id="trade-panel" style="display:none; border-top:1px solid var(--border); padding-top:20px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <span id="display-name" style="font-size:1.2rem; font-weight:700;">--</span>
        <span id="display-price" style="font-size:1.5rem; font-family:var(--mono); color:var(--accent);">--</span>
      </div>
      <div style="font-size:0.8rem; color:var(--text3); margin-bottom:15px;" id="display-change">--</div>
      <input type="number" id="trade-qty" placeholder="交易張數 (1張=1000股)" min="1">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <button class="btn btn-buy" onclick="executeTrade('buy')">買入</button>
        <button class="btn btn-sell" onclick="executeTrade('sell')">賣出</button>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-leaderboard">
  <div class="card">
    <div style="font-weight:700; margin-bottom:15px;">全球交易排行</div>
    <div id="leaderboard-list"></div>
  </div>
</div>

<div class="page" id="page-community">
  <div class="card">
    <textarea id="post-input" rows="3" placeholder="分享你的交易心得..."></textarea>
    <button class="btn" style="background:var(--accent2); color:#fff;" onclick="submitPost()">發布貼文</button>
  </div>
  <div id="posts-container"></div>
</div>

<div id="toast"></div>

<script>
// ── 核心狀態 ──
const INITIAL_CASH = 1000000;
let currentUser = null;
let state = { cash: INITIAL_CASH, holdings: {}, trades: [], posts: [] };
let selectedStock = null;

// ── 1. Google 登入與資料同步 ──
function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  currentUser = { id: payload.sub, name: payload.name, photo: payload.picture };
  
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('user-name').textContent = currentUser.name;
  document.getElementById('user-photo').src = currentUser.photo;
  document.getElementById('welcome-name').textContent = currentUser.name;
  
  // 載入存檔
  const saved = localStorage.getItem(`insist_save_${currentUser.id}`);
  if(saved) state = JSON.parse(saved);
  
  initApp();
}

function save() {
  if(currentUser) localStorage.setItem(`insist_save_${currentUser.id}`, JSON.stringify(state));
}

// ── 2. 原始 API 報價與校準邏輯 (保留原汁原味) ──
async function fetchQuote(code) {
  const symbol = code + '.TW';
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
  const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`;
  
  try {
    const r = await fetch(proxy);
    const d = await r.json();
    const meta = d?.chart?.result?.[0]?.meta;
    if (!meta) return null;
    return {
      code,
      name: meta.shortName || code,
      price: meta.regularMarketPrice,
      change: meta.regularMarketPrice - meta.previousClose
    };
  } catch(e) { return null; }
}

async function testAndCalibrateAPI() {
  setApiBadge('loading');
  const q = await fetchQuote('2330'); // 以台積電測試
  if (q && q.price) {
    setApiBadge('ok');
    console.log('[API 校準成功] 目前台積電價格:', q.price);
  } else {
    setApiBadge('err');
    showToast("報價系統連線異常", "error");
  }
}

async function triggerSearch() {
  const code = document.getElementById('stock-search').value.trim();
  if(!code) return;
  const q = await fetchQuote(code);
  if(q) {
    selectedStock = q;
    document.getElementById('trade-panel').style.display = 'block';
    document.getElementById('display-name').textContent = q.name;
    document.getElementById('display-price').textContent = q.price.toFixed(2);
    document.getElementById('display-change').textContent = (q.change >= 0 ? '▲ ' : '▼ ') + Math.abs(q.change).toFixed(2);
    document.getElementById('display-change').style.color = q.change >= 0 ? 'var(--green)' : 'var(--red)';
  } else {
    showToast("搜尋不到該股票代碼", "error");
  }
}

// ── 3. 交易執行 ──
function executeTrade(type) {
  const qty = parseInt(document.getElementById('trade-qty').value);
  if(!selectedStock || !qty || qty <= 0) return showToast("請輸入有效張數");
  
  const amount = selectedStock.price * qty * 1000;
  if(type === 'buy') {
    if(state.cash < amount) return showToast("餘額不足", "error");
    state.cash -= amount;
    state.holdings[selectedStock.code] = (state.holdings[selectedStock.code] || 0) + qty;
  } else {
    if((state.holdings[selectedStock.code] || 0) < qty) return showToast("持股不足", "error");
    state.cash += amount;
    state.holdings[selectedStock.code] -= qty;
    if(state.holdings[selectedStock.code] === 0) delete state.holdings[selectedStock.code];
  }
  
  state.trades.push({ type, code: selectedStock.code, qty, price: selectedStock.price, time: new Date().toLocaleString() });
  save();
  updateUI();
  showToast(type === 'buy' ? "買入成功" : "賣出成功", "success");
}

// ── 4. UI 渲染邏輯 ──
function updateUI() {
  document.getElementById('nav-cash').textContent = `$${state.cash.toLocaleString()}`;
  document.getElementById('total-assets').textContent = `$${state.cash.toLocaleString()}`;
  document.getElementById('holding-count').textContent = Object.keys(state.holdings).length;
  
  const tbody = document.getElementById('holdings-body');
  tbody.innerHTML = Object.keys(state.holdings).length ? 
    Object.keys(state.holdings).map(code => `
      <tr>
        <td><span class="stock-code">${code}</span></td>
        <td>${state.holdings[code]}</td>
        <td>--</td><td>--</td><td>--</td>
      </tr>
    `).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text3);">尚無持倉</td></tr>';
    
  renderPosts();
  renderLeaderboard();
}

function renderPosts() {
  const container = document.getElementById('posts-container');
  if(!container) return;
  container.innerHTML = state.posts.map(p => `
    <div class="post-card">
      <div style="color:var(--accent); font-weight:700; margin-bottom:5px;">${p.user}</div>
      <div>${p.content}</div>
    </div>
  `).join('');
}

function submitPost() {
  const input = document.getElementById('post-input');
  if(!input.value.trim()) return;
  state.posts.unshift({ user: currentUser.name, content: input.value });
  input.value = '';
  save();
  renderPosts();
}

function renderLeaderboard() {
  const list = document.getElementById('leaderboard-list');
  const players = [
    { name: currentUser?.name || "您", cash: state.cash },
    { name: "系統 AI", cash: 1200000 },
    { name: "投資小天才", cash: 950000 }
  ].sort((a,b) => b.cash - a.cash);

  list.innerHTML = players.map((p, i) => `
    <div class="rank-row">
      <div style="font-family:var(--mono); font-weight:700;">#${i+1}</div>
      <div style="flex:1;">${p.name}</div>
      <div style="color:var(--green);">$${p.cash.toLocaleString()}</div>
    </div>
  `).join('');
  
  const myIndex = players.findIndex(p => p.name === (currentUser?.name || "您")) + 1;
  document.getElementById('my-rank').textContent = '#' + myIndex;
}

// ── 5. 通用與初始化 ──
function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderLeft = `4px solid ${type === 'error' ? 'var(--red)' : 'var(--green)'}`;
  t.className = 'show';
  setTimeout(() => t.className = '', 3000);
}

function setApiBadge(status) {
  const b = document.getElementById('api-badge');
  b.className = 'api-badge api-' + status;
  b.textContent = status === 'ok' ? 'API 連線正常' : (status === 'loading' ? '正在校準 API' : 'API 連線錯誤');
}

function initApp() {
  const now = new Date();
  const h = now.getHours();
  document.getElementById('market-status-sub').textContent = (h >= 9 && h < 14) ? "台股市場開放中 🟢" : "市場已收盤 🔴 (顯示最後行情)";
  testAndCalibrateAPI();
  updateUI();
}

function logout() { if(confirm("確定登出嗎？資料已安全儲存。")) location.reload(); }

</script>
</body>
</html>
