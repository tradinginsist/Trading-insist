<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Insist — 模擬交易平台</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0a0e1a;--bg2:#0f1525;--bg3:#151d30;--border:#1e2d4a;
            --accent:#00e5ff;--accent2:#7c3aed;--green:#00e676;--red:#ff1744;
            --yellow:#ffd600;--text:#e8f0fe;--text2:#8899bb;--text3:#445577;
            --card:#111827;--mono:'Space Mono',monospace;--sans:'Noto Sans TC',sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; line-height:1.6; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .setup-box { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:2.5rem; width:450px; max-width:90vw; text-align:center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        nav { position:sticky; top:0; z-index:100; background:rgba(10,14,26,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:65px; }
        .nav-logo { font-family:var(--mono); font-size:1.2rem; color:var(--accent); letter-spacing:2px; font-weight:700; }
        .nav-tabs { display:flex; gap:10px; }
        .nav-tab { padding:0.5rem 1.2rem; border-radius:8px; cursor:pointer; font-size:0.9rem; color:var(--text2); border:none; background:none; transition:0.3s; }
        .nav-tab.active { color:var(--accent); background:rgba(0,229,255,0.1); font-weight:700; }
        
        .page { display:none; padding:2rem; max-width:1200px; margin:0 auto; }
        .page.active { display:block; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:1.5rem; margin-bottom:1.5rem; }
        
        table { width:100%; border-collapse:collapse; margin-top:1rem; }
        th { color:var(--text3); font-size:0.8rem; text-align:left; padding:1rem; border-bottom:1px solid var(--border); text-transform:uppercase; }
        td { padding:1rem; border-bottom:1px solid rgba(30,45,74,0.3); font-size:0.95rem; }
        
        .btn { padding:0.8rem 1.5rem; border-radius:10px; border:none; cursor:pointer; font-weight:700; transition:0.2s; font-family:var(--sans); }
        input { background:var(--bg2); border:1px solid var(--border); color:#fff; padding:1rem; border-radius:10px; width:100%; margin-bottom:15px; font-size:1rem; }
        
        .api-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-family: var(--mono); }
        .api-ok { background: rgba(0,230,118,0.15); color: var(--green); }
        .api-err { background: rgba(255,23,68,0.15); color: var(--red); }
        .api-loading { background: rgba(255,214,0,0.15); color: var(--yellow); }

        #toast { position:fixed; bottom:2rem; right:2rem; z-index:10000; background:var(--bg3); border:1px solid var(--border); padding:1rem 2rem; border-radius:12px; opacity:0; pointer-events:none; transition:0.3s; }
        #toast.show { opacity:1; transform:translateY(-10px); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="setup-box">
        <h1 class="nav-logo" style="font-size:2rem; margin-bottom:1rem;">TRADING INSIST</h1>
        <p style="color:var(--text2); margin-bottom:2rem;">請使用 Google 帳號登入以儲存您的交易進度</p>
        <div id="g_id_onload"
             data-client_id="72739400749-0u8qmvp1fsm3kbiu76kuk3ka1mvac6no.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>
</div>

<nav>
    <div class="nav-logo">TRADING INSIST</div>
    <div class="nav-tabs">
        <div class="nav-tab active" onclick="showPage('dashboard', this)">總覽</div>
        <div class="nav-tab" onclick="showPage('trade', this)">交易</div>
        <div class="nav-tab" onclick="showPage('community', this)">社群</div>
    </div>
    <div id="user-info" style="display:flex; align-items:center; gap:10px;">
        <span id="api-status" class="api-badge api-loading">API 檢查中</span>
        <span id="nav-cash" style="color:var(--green); font-family:var(--mono); font-weight:700;">$1,000,000</span>
        <img id="user-avatar" src="" style="width:30px; border-radius:50%; display:none; border: 1px solid var(--accent);">
    </div>
</nav>

<div id="page-dashboard" class="page active">
    <div class="card">
        <h2 id="welcome-text">歡迎回來，交易員</h2>
        <p id="market-status" style="color:var(--text3); margin-top:5px;">載入市場狀態...</p>
    </div>
    <div class="card">
        <h3>我的持倉</h3>
        <table>
            <thead><tr><th>股票</th><th>持有張數</th><th>現價</th><th>損益</th></tr></thead>
            <tbody id="holdings-list"></tbody>
        </table>
    </div>
</div>

<div id="page-trade" class="page">
    <div class="card">
        <h3>即時交易中心</h3>
        <input type="text" id="stock-input" placeholder="輸入台股代碼 (如: 2330)">
        <button class="btn" style="background:var(--accent); color:#000; width:100%;" onclick="searchStock()">查詢行情</button>
        
        <div id="trade-ui" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span id="stock-name" style="font-size:1.5rem; font-weight:900;">--</span>
                <span id="stock-price" style="font-size:1.8rem; font-family:var(--mono); color:var(--accent);">--</span>
            </div>
            <input type="number" id="trade-qty" placeholder="交易張數 (1張=1000股)">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <button class="btn" style="background:var(--green); color:#000;" onclick="doTrade('buy')">買入</button>
                <button class="btn" style="background:var(--red); color:#fff;" onclick="doTrade('sell')">賣出</button>
            </div>
        </div>
    </div>
</div>

<div id="page-community" class="page">
    <div class="card">
        <h3>社群討論區</h3>
        <input type="text" id="post-text" placeholder="分享你的看法...">
        <button class="btn" style="background:var(--accent2); color:#fff;" onclick="addPost()">發布貼文</button>
    </div>
    <div id="posts-list"></div>
</div>

<div id="toast"></div>

<script>
    // --- 核心變數 ---
    let state = { cash: 1000000, holdings: {}, posts: [] };
    let currentStock = null;
    let user = null;

    // --- 1. Google 登入與資料同步 ---
    function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        user = { id: payload.sub, name: payload.name, img: payload.picture };
        
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('welcome-text').textContent = `早安，${user.name} 👋`;
        document.getElementById('user-avatar').src = user.img;
        document.getElementById('user-avatar').style.display = 'block';
        
        loadData();
        initMarket();
    }

    function saveData() {
        if(user) localStorage.setItem(`trading_save_${user.id}`, JSON.stringify(state));
    }
    
    function loadData() {
        const saved = localStorage.getItem(`trading_save_${user.id}`);
        if(saved) state = JSON.parse(saved);
        updateUI();
    }

    // --- 2. API 報價與校準邏輯 (保留原版) ---
    async function searchStock() {
        const code = document.getElementById('stock-input').value.trim();
        if(!code) return;
        
        try {
            const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+code+'.TW')}`);
            const data = await res.json();
            const meta = data.chart.result[0].meta;
            currentStock = { code, name: meta.shortName, price: meta.regularMarketPrice };
            
            document.getElementById('trade-ui').style.display = 'block';
            document.getElementById('stock-name').textContent = currentStock.name;
            document.getElementById('stock-price').textContent = currentStock.price.toFixed(2);
            setApiStatus('ok');
        } catch(e) {
            showToast("找不到該股票代碼", "red");
            setApiStatus('err');
        }
    }

    // --- 3. 交易邏輯 ---
    function doTrade(type) {
        const qty = parseInt(document.getElementById('trade-qty').value);
        if(!currentStock || !qty || qty <= 0) return;
        
        const total = currentStock.price * qty * 1000;
        if(type === 'buy') {
            if(state.cash < total) return showToast("資金不足", "red");
            state.cash -= total;
            state.holdings[currentStock.code] = (state.holdings[currentStock.code] || 0) + qty;
        } else {
            if((state.holdings[currentStock.code] || 0) < qty) return showToast("持股不足", "red");
            state.cash += total;
            state.holdings[currentStock.code] -= qty;
            if(state.holdings[currentStock.code] <= 0) delete state.holdings[currentStock.code];
        }
        saveData();
        updateUI();
        showToast("交易完成！", "green");
    }

    // --- 4. UI 渲染 ---
    function updateUI() {
        document.getElementById('nav-cash').textContent = `$${state.cash.toLocaleString()}`;
        const list = document.getElementById('holdings-list');
        list.innerHTML = Object.entries(state.holdings).length ? 
            Object.entries(state.holdings).map(([code, qty]) => `
                <tr><td><strong>${code}</strong></td><td>${qty}</td><td>--</td><td>--</td></tr>
            `).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--text3);">目前無持股</td></tr>';
        renderPosts();
    }

    function addPost() {
        const input = document.getElementById('post-text');
        if(!input.value.trim()) return;
        state.posts.unshift({ user: user.name, text: input.value.trim() });
        input.value = '';
        saveData();
        renderPosts();
    }

    function renderPosts() {
        const container = document.getElementById('posts-list');
        container.innerHTML = state.posts.map(p => `
            <div class="card" style="margin-bottom:10px;">
                <div style="color:var(--accent); font-weight:700;">${p.user}</div>
                <div>${p.text}</div>
            </div>
        `).join('');
    }

    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${id}`).classList.add('active');
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
    }

    function showToast(m, color) {
        const t = document.getElementById('toast');
        t.textContent = m;
        t.style.borderLeft = `4px solid ${color === 'red' ? 'var(--red)' : 'var(--green)'}`;
        t.className = 'show';
        setTimeout(() => t.className = '', 2500);
    }

    function setApiStatus(status) {
        const b = document.getElementById('api-status');
        b.className = 'api-badge api-' + status;
        b.textContent = status === 'ok' ? 'API 連線正常' : (status === 'loading' ? '正在校準 API' : 'API 連線錯誤');
    }

    function initMarket() {
        const h = new Date().getHours();
        document.getElementById('market-status').textContent = (h>=9 && h<14) ? "台股市場開放中 🟢" : "市場已收盤 🔴";
        setApiStatus('ok');
    }

    function logout() {
        if(confirm("確定要登出嗎？您的資料已安全儲存。")) location.reload();
    }
</script>
</body>
</html>
