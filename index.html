<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Insist — 模擬交易平台 (Firebase 修正版)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a;--bg2:#0f1525;--bg3:#151d30;--border:#1e2d4a;
    --accent:#00e5ff;--accent2:#7c3aed;--green:#00e676;--red:#ff1744;
    --yellow:#ffd600;--text:#e8f0fe;--text2:#8899bb;--text3:#445577;
    --card:#111827;--mono:'Space Mono',monospace;--sans:'Noto Sans TC',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.25;pointer-events:none;}

  /* Firebase UI */
  .user-profile { display: flex; align-items: center; gap: 8px; background: var(--bg3); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }
  .user-avatar { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--accent); }
  .btn-auth { background: var(--accent); color: #000; border: none; padding: 5px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 900; cursor: pointer; font-family: var(--sans); }
  .btn-auth.logout { background: transparent; color: var(--text3); border: 1px solid var(--border); }

  /* NAV */
  nav{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;}
  .nav-logo{font-family:var(--mono);font-size:1.1rem;color:var(--accent);letter-spacing:2px;font-weight:700;}
  .nav-logo span{color:var(--text2);}
  .nav-tabs{display:flex;gap:0.25rem;}
  .nav-tab{padding:0.4rem 1rem;border-radius:6px;cursor:pointer;font-size:0.85rem;color:var(--text2);border:none;background:none;transition:all 0.2s;font-family:var(--sans);}
  .nav-tab:hover{color:var(--text);background:var(--bg3);}
  .nav-tab.active{color:var(--accent);background:rgba(0,229,255,0.08);}
  .nav-right{display:flex;align-items:center;gap:1rem;}
  .nav-cash{font-family:var(--mono);font-size:0.85rem;color:var(--green);font-weight:700;}
  .api-badge{font-size:0.7rem;font-family:var(--mono);padding:0.2rem 0.6rem;border-radius:4px;}
  .api-ok{background:rgba(0,230,118,0.1);color:var(--green);}
  .api-err{background:rgba(255,23,68,0.1);color:var(--red);}
  .api-loading{background:rgba(255,214,0,0.1);color:var(--yellow);}

  /* PAGES */
  .page{display:none;padding:2rem;max-width:1400px;margin:0 auto;position:relative;z-index:1;}
  .page.active{display:block;animation:fadeIn 0.3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* COMPONENTS */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;}
  .dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
  .stat-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--text3);font-family:var(--mono);margin-bottom:0.5rem;}
  .stat-value{font-size:1.6rem;font-weight:900;font-family:var(--mono);}
  .stat-sub{font-size:0.75rem;color:var(--text2);margin-top:0.25rem;font-family:var(--mono);}
  .up{color:var(--green)}.down{color:var(--red)}.neutral{color:var(--accent)}
  .dash-main{display:grid;grid-template-columns:1fr 320px;gap:1.5rem;}
  table{width:100%;border-collapse:collapse;}
  th{font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-family:var(--mono);padding:0.6rem 0.75rem;text-align:left;border-bottom:1px solid var(--border);}
  td{padding:0.75rem;font-size:0.88rem;border-bottom:1px solid rgba(30,45,74,0.5);}
  
  /* TRADE FORM & SEARCH */
  .search-wrap{position:relative;}
  .search-input{width:100%;padding:0.75rem 1rem;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;}
  .search-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);z-index:100;max-height:200px;overflow-y:auto;}
  .search-item{padding:0.75rem;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
  .search-item:hover{background:var(--bg3);}
  
  .btn{padding:0.85rem;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-family:var(--sans);}
  .btn-buy{background:var(--green);color:#000;width:100%;}
  .btn-sell{background:var(--red);color:#fff;width:100%;}
  
  .trade-summary{background:var(--bg3);padding:1rem;border-radius:8px;margin:1rem 0;font-family:var(--mono);font-size:0.85rem;}
  .ts-row{display:flex;justify-content:space-between;margin-bottom:0.3rem;}

  /* TOAST */
  #toast{position:fixed;bottom:2rem;right:2rem;z-index:999;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:1rem 1.5rem;font-size:0.88rem;transform:translateY(100px);opacity:0;transition:all 0.3s;}
  #toast.show{transform:translateY(0);opacity:1;}
  #toast.success{border-color:var(--green);color:var(--green);}
  #toast.error{border-color:var(--red);color:var(--red);}

  /* LEADERBOARD & OTHERS */
  .rank-row{display:flex;align-items:center;padding:1rem;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:0.5rem;}
  .rank-num{width:30px;font-weight:700;color:var(--accent);}
  .rank-name{flex:1;margin-left:10px;}
  .rank-return{font-family:var(--mono);font-weight:700;}
  
  @media(max-width:900px){ .dash-grid{grid-template-columns:repeat(2,1fr)} .dash-main{grid-template-columns:1fr} }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">TRADING <span>INSIST</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('dashboard',this)">總覽</button>
    <button class="nav-tab" onclick="switchPage('trade',this)">交易</button>
    <button class="nav-tab" onclick="switchPage('leaderboard',this)">排行榜</button>
    <button class="nav-tab" onclick="switchPage('learn',this)">學習</button>
    <button class="nav-tab" onclick="switchPage('community',this)">社群</button>
  </div>
  <div class="nav-right">
    <div id="user-info" class="user-profile" style="display:none;">
        <img id="user-avatar" class="user-avatar" src="" alt="">
        <span id="display-name" style="font-size:0.8rem; color:var(--text2);"></span>
    </div>
    <button id="auth-btn" class="btn-auth">Google 登入</button>
    <span id="api-badge" class="api-badge api-loading">API OK</span>
    <span class="nav-cash" id="nav-cash">$1,000,000</span>
  </div>
</nav>

<div class="page active" id="page-dashboard">
  <div class="page-header">
    <div class="page-title">早安，<span id="welcome-name">訪客</span> 👋</div>
    <div class="page-sub" id="market-status-sub">台股模擬交易系統</div>
  </div>
  <div class="dash-grid">
    <div class="stat-card"><div class="stat-label">總資產</div><div class="stat-value neutral" id="total-assets">$1,000,000</div></div>
    <div class="stat-card"><div class="stat-label">獲利</div><div class="stat-value up" id="unrealized-pnl">$0</div></div>
    <div class="stat-card"><div class="stat-label">持股</div><div class="stat-value neutral" id="holding-count">0</div></div>
    <div class="stat-card"><div class="stat-label">排名</div><div class="stat-value neutral">#1</div></div>
  </div>
  <div class="card">
    <div style="margin-bottom:1rem; font-weight:700;">我的持倉</div>
    <table><thead><tr><th>股票</th><th>股數</th><th>成本</th><th>現價</th><th>損益</th></tr></thead>
      <tbody id="holdings-body"><tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text3);">目前無持倉</td></tr></tbody>
    </table>
  </div>
</div>

<div class="page" id="page-trade">
  <div class="card" style="max-width:500px;margin:0 auto;">
    <div style="margin-bottom:1.5rem; font-weight:700;">股票交易中心</div>
    <div class="search-wrap">
      <input type="text" id="stock-search" class="search-input" placeholder="輸入代碼 (如 2330)" oninput="onSearchInput()">
      <div id="search-dropdown" class="search-dropdown" style="display:none;"></div>
    </div>
    
    <div id="price-display" style="margin:1.5rem 0; text-align:center; display:none;">
        <div id="stock-name-display" style="font-size:1.2rem; font-weight:700;"></div>
        <div id="current-price-display" style="font-size:2.5rem; font-family:var(--mono); color:var(--accent);">$ 0.0</div>
    </div>

    <div style="margin-top:1rem;">
      <label style="font-size:0.75rem; color:var(--text3);">買入張數 (1張=1000股)</label>
      <input type="number" id="trade-qty" class="search-input" style="margin-top:0.5rem;" min="1" value="1" oninput="updateTradeSummary()">
    </div>

    <div class="trade-summary" id="trade-summary" style="display:none;">
        <div class="ts-row"><span>預估金額:</span><span id="ts-total">$0</span></div>
        <div class="ts-row"><span>手續費:</span><span id="ts-fee">$0</span></div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1rem;">
      <button class="btn btn-buy" onclick="executeTrade('buy')">買入</button>
      <button class="btn btn-sell" onclick="executeTrade('sell')">賣出</button>
    </div>
  </div>
</div>

<div class="page" id="page-leaderboard">
    <div class="card">
        <div style="margin-bottom:1rem; font-weight:700;">本週模擬賽排行榜</div>
        <div id="leaderboard-list">
            <div class="rank-row"><span class="rank-num">1</span><span class="rank-name">Alex (You)</span><span class="rank-return">0.00%</span></div>
        </div>
    </div>
</div>

<div class="page" id="page-learn"><div class="card">學習模組開發中...</div></div>
<div class="page" id="page-community"><div class="card">社群功能開發中...</div></div>

<div id="toast"></div>

<script type="module">
// ── FIREBASE 配置 ──
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDm6uWVn45VmbMnVps79fnz07NQAm9RVhw",
    authDomain: "trading-insist.firebaseapp.com",
    projectId: "trading-insist",
    storageBucket: "trading-insist.firebasestorage.app",
    messagingSenderId: "723670007468",
    appId: "1:723670007468:web:11fd018a81d3535c1d6909"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// UI 元素
const authBtn = document.getElementById('auth-btn');
const userInfoArea = document.getElementById('user-info');
const userAvatar = document.getElementById('user-avatar');
const displayNameSpan = document.getElementById('display-name');
const welcomeName = document.getElementById('welcome-name');

// ── 監聽登入 ──
onAuthStateChanged(auth, (user) => {
    if (user) {
        authBtn.innerText = "登出";
        authBtn.classList.add('logout');
        userInfoArea.style.display = 'flex';
        userAvatar.src = user.photoURL;
        displayNameSpan.innerText = user.displayName;
        welcomeName.innerText = user.displayName;
    } else {
        authBtn.innerText = "Google 登入";
        authBtn.classList.remove('logout');
        userInfoArea.style.display = 'none';
        welcomeName.innerText = "訪客";
    }
});

authBtn.onclick = async () => {
    if (auth.currentUser) {
        await signOut(auth);
        showToast("已登出", "success");
    } else {
        try {
            await signInWithPopup(auth, provider);
            showToast("歡迎回來！", "success");
        } catch (e) { showToast("登入取消", "error"); }
    }
};

// 雲端記錄
window.logToCloud = async (action, detail) => {
    if (!auth.currentUser) return;
    try {
        await addDoc(collection(db, "user_logs"), {
            uid: auth.currentUser.uid,
            name: auth.currentUser.displayName,
            action: action,
            detail: detail,
            time: serverTimestamp()
        });
    } catch (e) { console.error(e); }
};
</script>

<script>
// ── 交易與 UI 邏輯 ──
let state = { cash: 1000000, holdings: {} };
let selectedStock = null;

// 切換頁面函數 (修正按鈕沒反應的問題)
function switchPage(pageId, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    if (btn) btn.classList.add('active');
}

// 模擬報價
const STOCKS = { "2330": {name: "台積電", price: 780}, "2317": {name: "鴻海", price: 150}, "2454": {name: "聯發科", price: 1100} };

function onSearchInput() {
    const val = document.getElementById('stock-search').value;
    const drop = document.getElementById('search-dropdown');
    if (STOCKS[val]) {
        drop.innerHTML = `<div class="search-item" onclick="selectStock('${val}')"><span>${val} ${STOCKS[val].name}</span><span>$${STOCKS[val].price}</span></div>`;
        drop.style.display = 'block';
    } else { drop.style.display = 'none'; }
}

function selectStock(code) {
    selectedStock = { code, ...STOCKS[code] };
    document.getElementById('search-dropdown').style.display = 'none';
    document.getElementById('price-display').style.display = 'block';
    document.getElementById('stock-name-display').innerText = selectedStock.name;
    document.getElementById('current-price-display').innerText = '$ ' + selectedStock.price;
    updateTradeSummary();
}

function updateTradeSummary() {
    if (!selectedStock) return;
    const qty = document.getElementById('trade-qty').value || 0;
    const total = selectedStock.price * qty * 1000;
    document.getElementById('trade-summary').style.display = 'block';
    document.getElementById('ts-total').innerText = '$' + total.toLocaleString();
    document.getElementById('ts-fee').innerText = '$' + Math.round(total * 0.001425).toLocaleString();
}

function executeTrade(type) {
    if (!selectedStock) { showToast("請先選擇股票", "error"); return; }
    const qty = parseInt(document.getElementById('trade-qty').value);
    const shares = qty * 1000;
    const cost = selectedStock.price * shares;

    if (type === 'buy') {
        if (state.cash < cost) { showToast("現金不足", "error"); return; }
        state.cash -= cost;
        state.holdings[selectedStock.code] = (state.holdings[selectedStock.code] || 0) + shares;
        showToast(`買入 ${selectedStock.name} 成功`, "success");
        if (window.logToCloud) window.logToCloud("BUY", `${selectedStock.code} ${qty}張`);
    } else {
        if (!state.holdings[selectedStock.code] || state.holdings[selectedStock.code] < shares) { showToast("持股不足", "error"); return; }
        state.cash += cost;
        state.holdings[selectedStock.code] -= shares;
        showToast(`賣出 ${selectedStock.name} 成功`, "success");
        if (window.logToCloud) window.logToCloud("SELL", `${selectedStock.code} ${qty}張`);
    }
    updateUI();
}

function updateUI() {
    document.getElementById('nav-cash').innerText = '$' + Math.round(state.cash).toLocaleString();
    document.getElementById('total-assets').innerText = '$' + Math.round(state.cash).toLocaleString();
    const body = document.getElementById('holdings-body');
    body.innerHTML = "";
    let count = 0;
    for (let code in state.holdings) {
        if (state.holdings[code] > 0) {
            count++;
            body.innerHTML += `<tr><td>${code}</td><td>${state.holdings[code]}</td><td>-</td><td>${STOCKS[code].price}</td><td>-</td></tr>`;
        }
    }
    if (count === 0) body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;">目前無持倉</td></tr>';
    document.getElementById('holding-count').innerText = count;
}

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.className = 'show ' + type;
    setTimeout(() => t.className = '', 3000);
}
</script>
</body>
</html>
